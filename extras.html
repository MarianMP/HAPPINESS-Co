<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Extras - Happiness & Co</title>
  <style>
    :root { --magenta: #ba007c; --azul: #009bdb; --naranja: #ff7b00; --gris: #555555; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #fff; border-bottom: 2px solid var(--gris); position: sticky; top: 0; z-index: 1000; }
    nav a { text-decoration: none; color: #333; margin-left: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .filter-btns { display: flex; gap: 10px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
    .filter-btns a { text-decoration: none; padding: 15px 25px; color: white; border-radius: 4px; font-size: 13px; font-weight: bold; text-transform: uppercase; }
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .card { border: 1px solid #eee; padding: 25px; border-top: 8px solid var(--gris); display: flex; flex-direction: column; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card img { width: 100%; height: 150px; object-fit: cover; margin-bottom: 15px; border-radius: 4px; }
    .card h4 { margin-bottom: 5px; font-size: 17px; }
    .card p { font-size: 13px; color: #666; margin-bottom: 15px; }
    .btn-reserva { background: #333; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; }
    .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
    .modal-content { background: #fff; width: 90%; max-width: 400px; margin: 10% auto; padding: 35px; border-radius: 8px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
  </style>
</head>
<body>
<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <button onclick="history.back()" style="background: #f4f4f4; border: 1px solid #ccc; padding: 8px 12px; cursor: pointer; font-size: 10px; font-weight: bold; color: #555; border-radius: 4px;">&#10094; VOLVER</button>
        <a href="index.html"><img src="Assets/img/happines-and-co-propuesta-02.png" alt="Logo" style="height: 45px;"></a>
    </div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="eventos.html">Eventos</a>
        <a href="historial.html">Historial</a>
        <a href="empresa.html">Sobre Nosotros</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<main class="container">
    <div class="filter-btns">
        <a href="eventos.html" style="background: #333;">TODOS</a>
        <a href="musica.html" style="background: var(--magenta);">MÚSICA</a>
        <a href="escena.html" style="background: var(--azul);">ESCENA</a>
        <a href="social.html" style="background: var(--naranja);">SOCIAL</a>
        <a href="extras.html" style="background: var(--gris); outline: 3px solid #000;">EXTRAS</a>
    </div>

    <div class="event-grid">
    <div class="card"><h4>Descenso del Sella</h4><p>Arriondas - 08 Ago</p><button class="btn-reserva">RESERVAR</button></div>
    <div class="card"><h4>Festival de la Sidra</h4><p>Nava - 10-12 Jul</p><button class="btn-reserva">RESERVAR</button></div>
    <div class="card"><h4>Rally Princesa Asturias</h4><p>Oviedo - Sep</p><button class="btn-reserva">RESERVAR</button></div>
    <div class="card"><h4>Jornadas del Desarme</h4><p>Oviedo - 19 Oct</p><button class="btn-reserva">RESERVAR</button></div>
    <div class="card"><h4>Certamen Cabrales</h4><p>Cabrales - 30 Ago</p><button class="btn-reserva">RESERVAR</button></div>
</div>
        

<div id="reservaModal" class="modal">
    <div class="modal-content">
        <h3 id="eventTitle">Reserva</h3>
        <input type="text" placeholder="Tu nombre">
        <input type="email" placeholder="Tu email">
        <button onclick="alert('Reserva registrada correctamente'); closeModal()" style="width:100%; padding:12px; background:var(--gris); color:white; border:none; cursor:pointer; font-weight:bold;">CONFIRMAR</button>
        <p onclick="closeModal()" style="text-align:center; margin-top:15px; cursor:pointer; font-size:12px; text-decoration:underline;">Cerrar</p>
    </div>
</div>

<script>
    function openModal(name) { document.getElementById('reservaModal').style.display='block'; document.getElementById('eventTitle').innerText = name; }
    function closeModal() { document.getElementById('reservaModal').style.display='none'; }
</script>
</body>
</html>
