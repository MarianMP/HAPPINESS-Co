<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happiness & Co - Música</title>
<style>
:root { --magenta: #ba007c; --azul: #009bdb; --naranja: #ff7b00; --gris: #555555; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; color: #333; }
header { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; border-bottom: 1px solid #eee;}
.logo-img { height: 60px; }
nav a { text-decoration: none; color: #333; margin-left: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
.btn-contacto { background: var(--magenta); color: white !important; padding: 6px 15px; }
.container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
h2 { font-size: 18px; margin-bottom: 25px; text-transform: uppercase; border-bottom: 2px solid var(--magenta); display: inline-block; }
.event-grid { display: flex; gap: 25px; margin-bottom: 60px; flex-wrap: wrap; }
.card { width: 30%; min-width: 280px; height: 300px; position: relative; border-top: 12px solid var(--magenta); border-right: 12px solid var(--magenta); background: #f4f4f4; }
.card::before { content: ""; position: absolute; top: 40px; left: 40px; right: 40px; bottom: 80px; background: repeating-conic-gradient(#eee 0% 25%, #ddd 0% 50%) 50% / 20px 20px; }
.card-btn { position: absolute; bottom: 15px; left: 15px; background: var(--magenta); color: white; border: none; padding: 6px 12px; font-size: 11px; cursor: pointer; }
.footer-banner { background: var(--magenta); text-align: center; padding: 30px 0; margin-top: 60px; }
.footer-banner img { width: 80%; max-width: 600px; }
.copyright { background: black; color: white; text-align: center; font-size: 11px; padding: 10px; }
</style>
</head>
<body>
<header>
  <a href="index.html"><img src="Assets/img/happines-and-co-propuesta-02.png" class="logo-img"></a>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="eventos.html">Eventos</a>
    <a href="empresa.html">Empresa</a>
    <a href="contacto.html" class="btn-contacto">Contacto</a>
  </nav>
</header>
<main class="container">
  <h2>Próximos Eventos Musicales</h2>
  <div class="event-grid">
    <div class="card"><button class="card-btn">Reservar</button></div>
    <div class="card"><button class="card-btn">Reservar</button></div>
    <div class="card"><button class="card-btn">Reservar</button></div>
  </div>
</main>
<footer>
  <div class="footer-banner"><img src="Assets/img/happines-and-co-propuesta-06.jpg"></div>
  <div class="copyright">© 2026 HAPPINESS&CO · Música</div>
</footer>
</body>
</html>
