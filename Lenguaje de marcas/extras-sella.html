<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descenso del Sella - Happiness & Co</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        :root { --magenta: #ba007c; --magenta-dark: #8e005f; --naranja: #ff7b00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #fcfcfc; color: #333; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #fff; border-bottom: 2px solid var(--naranja); position: sticky; top: 0; z-index: 1000; }
        .nav-link { text-decoration: none; color: #333; margin-left: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .event-hero { height: 400px; color: white; display: flex; align-items: flex-end; padding: 40px 5%; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('Assets/img/EVENTOS/descenso del sella/SELLA.jfif'); background-size: cover; background-position: center; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 40px; }
        .btn-reserva { background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dark) 100%); color: white; border: none; padding: 16px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase; font-size: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 100%; max-width: 500px; border-radius: 12px; overflow: hidden; border-top: 5px solid var(--naranja); }
        .checkout-body { padding: 25px; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; background: #f8f8f8; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .pay-method { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 4px; font-size: 11px; text-align: center; cursor: pointer; }
        .pay-method.active { border-color: var(--magenta); background: #fff0f9; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <a href="index.html"><img src="Assets/img/LOGOS/happines-and-co-propuesta-02.png" alt="Logo" style="height: 45px;"></a>
    </div>
    <nav>
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="contacto.html" class="nav-link" style="background: var(--magenta); color: white; padding: 8px 15px; border-radius: 4px;">Contacto</a>
    </nav>
</header>

<section class="event-hero">
    <div>
        <h1 style="font-size: 3rem; text-transform: uppercase;">Descenso del Sella</h1>
        <p>Les piragües 2026</p>
    </div>
</section>

<main class="container">
    <section>
        <h2 style="border-left: 5px solid var(--naranja); padding-left: 15px; margin-bottom: 20px;">La Gran Fiesta</h2>
        <p>El Descenso Internacional del Sella es la cita deportiva y festiva más importante de Asturias...</p>
    </section>
    <aside>
        <div style="background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #eee;">
            <p style="text-align: center; font-size: 11px; color: #999; text-transform: uppercase;">Inscripción desde</p>
            <h2 style="text-align: center; color: var(--magenta); margin-bottom: 20px; font-size: 32px;">25,00€</h2>
            <button class="btn-reserva" onclick="openCheckout()">
                <i class="fa-solid fa-water"></i> RESERVAR PLAZA
            </button>
        </div>
    </aside>
</main>

<div id="checkoutModal" class="modal">
    <div class="modal-content">
        <div class="checkout-body">
            <h2 style="margin-bottom:20px;">Finalizar Reserva</h2>
            <div class="ticket-row">
                <div><b>Inscripción</b><br><small>25,00€</small></div>
                <select id="q1" onchange="calc()" style="width: 60px;"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
            </div>
            <div class="ticket-row">
                <div><b>Picnic Pack</b><br><small>45,00€</small></div>
                <select id="q2" onchange="calc()" style="width: 60px;"><option value="0">0</option><option value="1">1</option></select>
            </div>
            <input type="text" placeholder="Nombre completo">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <div id="pT" class="pay-method active" onclick="setPay('T')">TARJETA</div>
                <div id="pB" class="pay-method" onclick="setPay('B')">BIZUM</div>
            </div>
        </div>
        <div style="padding: 20px; background: #fdfdfd; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <div><p style="font-size:10px; color:#999;">TOTAL</p><h2 id="mTotal">0,00€</h2></div>
            <button class="btn-reserva" style="width:auto; padding:12px 25px; border-radius:30px;" onclick="alert('Reserva enviada'); location.reload()">PAGAR</button>
        </div>
        <p onclick="closeCheckout()" style="text-align:center; padding-bottom:15px; cursor:pointer; color:#bbb; font-size:11px;">CANCELAR</p>
    </div>
</div>

<script>
    function openCheckout() { document.getElementById('checkoutModal').style.display='flex'; }
    function closeCheckout() { document.getElementById('checkoutModal').style.display='none'; }
    function calc() {
        let t = (document.getElementById('q1').value * 25) + (document.getElementById('q2').value * 45);
        document.getElementById('mTotal').innerText = t.toFixed(2).replace('.', ',') + "€";
    }
    function setPay(type) {
        document.getElementById('pT').className = type=='T'?'pay-method active':'pay-method';
        document.getElementById('pB').className = type=='B'?'pay-method active':'pay-method';
    }
</script>
</body>
</html>
