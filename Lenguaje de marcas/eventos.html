<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happiness & Co - Eventos</title>
<style>
:root { --magenta: #d10074; --azul: #0099da; --naranja: #ff8000; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; color: #333; }
header { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; }
.logo-img { height: 60px; }
nav a { text-decoration: none; color: #333; margin-left: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
.btn-contacto { background: var(--magenta); color: white !important; padding: 6px 15px; }
.container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
.switch-buttons { display: flex; gap: 15px; margin-bottom: 40px; }
.switch-buttons button { padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; background: #eee; }
.switch-buttons .active { background: var(--magenta); color: white; }
h2 { font-size: 18px; margin-bottom: 25px; text-transform: uppercase; border-bottom: 2px solid #333; display: inline-block; }
.event-grid { display: flex; gap: 25px; margin-bottom: 60px; flex-wrap: wrap; }
.card { width: 30%; min-width: 280px; height: 300px; position: relative; border-top: 12px solid; border-right: 12px solid; background: #ccc; }
.card::before { content: ""; position: absolute; top: 40px; left: 40px; right: 40px; bottom: 80px; background: repeating-conic-gradient(#eee 0% 25%, #ddd 0% 50%) 50% / 20px 20px; }
.card-btn { position: absolute; bottom: 15px; left: 15px; background: var(--magenta); color: white; border: none; padding: 6px 12px; font-size: 11px; cursor: pointer; }
.musical { border-color: var(--magenta); }
.teatral { border-color: var(--azul); }
.social { border-color: var(--naranja); }
.section { display: none; }
.section.active { display: block; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; }
.modal.active { display: flex; }
.modal-content { background: white; padding: 30px; width: 400px; border-radius: 10px; animation: aparecer 0.3s ease; }
@keyframes aparecer { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
form { display: flex; flex-direction: column; gap: 10px; }
form input, form select { padding: 8px; border: 1px solid #ccc; }
form button { background: var(--magenta); color: white; border: none; padding: 10px; cursor: pointer; }
</style>
</head>
<body>
<header>
  <img src="Assets/img/happines-and-co-propuesta-02.png" class="logo-img">
  <nav>
    <a href="index.html">Inicio</a>
    <a href="eventos.html">Eventos</a>
    <a href="empresa.html">Empresa</a>
    <a href="contacto.html" class="btn-contacto">Contacto</a>
  </nav>
</header>
<main class="container">
<div class="switch-buttons">
  <button class="active" onclick="showSection('proximos', this)">Próximos</button>
  <button onclick="showSection('anteriores', this)">Anteriores</button>
</div>
<div id="proximos" class="section active">
  <h2>Eventos musicales</h2>
  <div class="event-grid">
    <div class="card musical"><button class="card-btn" onclick="openModal('Musical 1')">Reservar</button></div>
    <div class="card musical"><button class="card-btn" onclick="openModal('Musical 2')">Reservar</button></div>
    <div class="card musical"><button class="card-btn" onclick="openModal('Musical 3')">Reservar</button></div>
  </div>
  <h2>Eventos teatrales</h2>
  <div class="event-grid">
    <div class="card teatral"><button class="card-btn" onclick="openModal('Teatral 1')">Reservar</button></div>
    <div class="card teatral"><button class="card-btn" onclick="openModal('Teatral 2')">Reservar</button></div>
    <div class="card teatral"><button class="card-btn" onclick="openModal('Teatral 3')">Reservar</button></div>
  </div>
  <h2>Eventos sociales</h2>
  <div class="event-grid">
    <div class="card social"><button class="card-btn" onclick="openModal('Social 1')">Reservar</button></div>
    <div class="card social"><button class="card-btn" onclick="openModal('Social 2')">Reservar</button></div>
    <div class="card social"><button class="card-btn" onclick="openModal('Social 3')">Reservar</button></div>
  </div>
</div>
<div id="anteriores" class="section">
  <h2>Eventos musicales</h2>
  <div class="event-grid">
    <div class="card musical"><button class="card-btn">Finalizado</button></div>
  </div>
</div>
</main>
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Inscripción al evento</h3>
    <form onsubmit="enviarFormulario(event)">
      <input type="text" placeholder="Nombre completo" required>
      <input type="email" placeholder="Correo electrónico" required>
      <input type="text" id="eventoSeleccionado" readonly>
      <input type="number" placeholder="Número de entradas" required>
      <button type="submit">Confirmar inscripción</button>
    </form>
    <button onclick="closeModal()" style="margin-top:10px;">Cerrar</button>
  </div>
</div>
<script>
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.switch-buttons button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function openModal(evento) {
  document.getElementById('modal').classList.add('active');
  document.getElementById('eventoSeleccionado').value = evento;
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function enviarFormulario(e) { e.preventDefault(); alert("Inscripción realizada correctamente 🎉"); closeModal(); }
</script>
</body>
</html>
