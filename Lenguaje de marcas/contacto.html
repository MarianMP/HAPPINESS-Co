<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HAPPINESS & Co | Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'h-rosa': '#ba007c', 'h-azul': '#009bdb', 'h-naranja': '#ff7b00', 'h-gris': '#555555' } } } }
    </script>
</head>
<body class="bg-slate-50">
    <nav class="bg-white p-6 flex justify-between items-center shadow-sm font-bold uppercase text-xs tracking-widest">
        <div class="text-2xl font-black text-h-rosa">H&Co</div>
        <div class="space-x-8 text-h-gris">
            <a href="index.html" class="hover:text-h-rosa transition">Inicio</a>
            <a href="eventos.html" class="hover:text-h-rosa transition">Eventos</a>
            <a href="nosotros.html" class="hover:text-h-rosa transition">La Empresa</a>
            <a href="contacto.html" class="text-h-rosa border-b-2 border-h-rosa pb-1">Contacto</a>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto py-24 px-6 text-center">
        <h2 class="text-5xl font-black mb-6 italic uppercase">¿Hablamos?</h2>
        <p class="text-gray-500 mb-12">Escríbenos para comprar entradas o proponer colaboraciones artísticas.</p>
        <form class="grid md:grid-cols-2 gap-6 bg-white p-12 rounded-3xl shadow-2xl">
            <input type="text" placeholder="Nombre" class="p-4 border-b-2 border-gray-100 outline-none focus:border-h-rosa font-bold">
            <input type="email" placeholder="Email" class="p-4 border-b-2 border-gray-100 outline-none focus:border-h-rosa font-bold">
            <textarea placeholder="Mensaje" class="md:col-span-2 p-4 border-b-2 border-gray-100 outline-none focus:border-h-rosa font-bold h-32"></textarea>
            <button class="md:col-span-2 bg-h-rosa text-white py-5 rounded-xl font-black uppercase tracking-widest hover:scale-105 transition shadow-lg">Enviar</button>
        </form>
    </div>
</body>
</html>
