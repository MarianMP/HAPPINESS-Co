<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="alternate" type="application/rss+xml" title="Happiness & Co - Agenda Cultural" href="rss.xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happiness & Co - Contacto</title>
    <style>
        :root { --magenta: #ba007c; --gris: #555555; --azul: #0099da; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; background-color: #fcfcfc; }
        
        /* HEADER UNIFICADO */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #ffffff; border-bottom: 2px solid var(--magenta); position: sticky; top:0; z-index:1000; }
        
        .container { max-width: 650px; margin: 60px auto; padding: 40px; border: 1px solid #eee; border-radius: 8px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        h2 { color: var(--magenta); margin-bottom: 10px; text-transform: uppercase; text-align: center; letter-spacing: 1px; }
        p.intro { text-align: center; margin-bottom: 30px; color: #666; font-size: 14px; }

        /* FORMULARIO */
        .form-group-row { display: flex; gap: 20px; }
        .form-group-row > div { flex: 1; }

        label { display: block; margin-bottom: 5px; font-size: 11px; font-weight: bold; color: var(--gris); text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--magenta); outline: none; box-shadow: 0 0 5px rgba(186, 0, 124, 0.1); }

        /* CHECKBOX */
        .checkbox-container { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; cursor: pointer; }
        .checkbox-container input { width: auto; margin-bottom: 0; cursor: pointer; }
        .checkbox-container span { font-size: 13px; color: #555; }

        .btn-enviar { background: var(--magenta); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: background 0.3s; border-radius: 4px; letter-spacing: 1px; }
        .btn-enviar:hover { background: #960064; }

        #mensajeExito { display: none; text-align: center; padding: 30px; background: #f0fff4; color: #2e7d32; border: 1px solid #c6f6d5; border-radius: 4px; margin-top: 20px; }

        /* FOOTER OSCURO */
        footer { background: #111; color: #777; text-align: center; padding: 50px 20px; margin-top: 80px; }
        .social-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .social-links a { color: #777; font-size: 20px; transition: 0.3s; text-decoration: none; }
        .social-links a:hover { color: #fff; transform: translateY(-3px); }
        .footer-divider { width: 40px; height: 1px; background: #444; margin: 20px auto; }
        .copyright { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #555; }

        @media (max-width: 600px) { .form-group-row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <button onclick="history.back()" style="background: #f4f4f4; border: 1px solid #ccc; padding: 8px 12px; cursor: pointer; font-size: 10px; font-weight: bold; color: #555; display: flex; align-items: center; gap: 5px; border-radius: 4px; text-transform: uppercase;">
            &#10094; VOLVER
        </button>
        <a href="index.html">
            <img src="Assets/img/LOGOS/happines-and-co-propuesta-02.png" alt="Logo Happiness & Co" style="height: 45px; display: block;">
        </a>
    </div>

    <nav style="display: flex; align-items: center; gap: 10px;">
        <a href="index.html" style="text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Inicio</a>
        <a href="eventos.html" style="text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Eventos</a>
        <a href="historial.html" style="text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Historial</a>
        <a href="empresa.html" style="text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Sobre Nosotros</a>
        <a href="fuentes.html" style="text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Fuentes</a>
        <a href="contacto.html" style="text-decoration: none; background: #ba007c; color: white; margin-left: 12px; padding: 8px 15px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Contacto</a>
        <a href="inicioSesion.html" style="text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; border: 1px solid #ccc; padding: 7px 12px; border-radius: 4px;">MI CUENTA</a>
    </nav>
</header>

<div class="container">
    <h2>Contacta con nosotros</h2>
    <p class="intro">¿Tienes dudas o quieres colaborar? Escríbenos y te responderemos pronto.</p>
    
    <form id="contactForm">
        <div class="form-group-row">
            <div>
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>
            <div>
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" placeholder="Tus apellidos" required>
            </div>
        </div>

        <div class="form-group-row">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div>
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="600 000 000">
            </div>
        </div>

        <label for="motivo">Motivo de la consulta</label>
        <select id="motivo" name="motivo">
            <option value="informacion">Información de Eventos</option>
            <option value="reserva">Problemas con una Reserva</option>
            <option value="prensa">Prensa / Marketing</option>
            <option value="otros">Otros</option>
        </select>

        <label for="mensaje">Comentario / Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe aquí tu consulta..." required></textarea>

        <label class="checkbox-container">
            <input type="checkbox" name="suscripcion" value="si">
            <span>Deseo inscribirme en la base de suscriptores para recibir novedades.</span>
        </label>

        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
    </form>

    <div id="mensajeExito">
        <i class="fa-solid fa-circle-check" style="font-size: 40px; margin-bottom: 15px;"></i><br>
        <strong>¡MENSAJE ENVIADO CON ÉXITO!</strong><br>
        Gracias por contactar con Happiness & Co Asturias.
    </div>
</div>

<footer>
    <div class="social-links">
        <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://twitter.com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>

    </div>
    <div class="footer-divider"></div>
    <div class="copyright">© 2026 HAPPINESS&CO · TODOS LOS DERECHOS RESERVADOS</div>
</footer>

<script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        this.style.display = 'none';
        document.getElementById('mensajeExito').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>

</body>
</html>
