<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Acceso | Happiness & Co</title>
    
    <link rel="alternate" type="application/rss+xml" title="Happiness & Co - Agenda Cultural" href="rss.xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --magenta: #ba007c; --gris: #f8f9fa; --texto: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        header { position: sticky; top: 0; z-index: 1001; }

        /* SPLIT SCREEN RESPONSIVE */
        #split-screen { 
            display: flex; 
            min-height: calc(100vh - 82px); 
            width: 100%; 
            transition: 0.5s; 
        }

        /* En móviles se apilan verticalmente */
        @media (max-width: 768px) {
            #split-screen { flex-direction: column; }
            .left-side { padding: 40px 20px !important; }
            .right-side { padding: 40px 5% !important; }
            header { flex-wrap: wrap; height: auto !important; padding: 10px 5% !important; }
            nav { overflow-x: auto; width: 100%; justify-content: flex-start !important; padding-top: 10px; }
            .nav-link { white-space: nowrap; margin-left: 8px; font-size: 10px; }
        }

        .left-side {
            flex: 1; background-color: var(--magenta); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 60px; text-align: center;
        }

        .right-side {
            flex: 1.2; background-color: white; display: flex; flex-direction: column;
            justify-content: center; padding: 0 10%; position: relative;
        }

        .form-container { animation: fadeIn 0.4s ease; width: 100%; max-width: 500px; margin: 0 auto; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-fill {
            background: var(--magenta); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
        }
        .btn-fill:hover { background: #9e006a; box-shadow: 0 5px 15px rgba(186,0,124,0.2); }

        .nav-link { text-decoration: none; color: #333; margin-left: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        #gallery-panel { display: none; padding: 50px 5%; background: #fdfdfd; min-height: 100vh; }
        .no-events-msg { grid-column: 1 / -1; text-align: center; padding: 40px; color: #888; font-style: italic; }
    </style>
</head>
<body onload="checkSession()">

<header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #ffffff; border-bottom: 2px solid #ba007c; position: sticky; top:0; z-index:1000;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <a href="index.html">
            <img src="Assets/img/LOGOS/happines-and-co-propuesta-02.png" alt="Logo Happiness & Co" style="height: 40px; display: block;">
        </a>
    </div>

    <nav style="display: flex; align-items: center; justify-content: flex-end;">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="eventos.html" class="nav-link">Eventos</a>
        <a href="historial.html" class="nav-link">Historial</a>
        <a href="empresa.html" class="nav-link">Sobre Nosotros</a>
        <a href="fuentes.html" class="nav-link">Fuentes</a>
        <a href="contacto.html" class="nav-link" style="background: #ba007c; color: white !important; padding: 6px 12px; border-radius: 4px;">Contacto</a>
        <a href="inicioSesion.html" class="nav-link" style="border: 1px solid #ccc; padding: 5px 10px; border-radius: 4px;">MI CUENTA</a>
    </nav>
</header>

<div id="split-screen">
    <div class="left-side">
        <img src="Assets/img/LOGOS/happines-and-co-propuesta-02.png" style="height: 50px; filter: brightness(0) invert(1); margin-bottom: 20px;">
        <p id="left-text" class="text-lg font-light">Regístrate para activar tu agenda de eventos.</p>
    </div>

    <div class="right-side">
        <div id="register-container" class="form-container">
            <h2 class="text-2xl font-bold mb-6">Crear Cuenta</h2>
            <form onsubmit="handleAuth(event, 'register')">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-magenta uppercase mb-1">Nombre</label>
                        <input type="text" id="regName" required class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-magenta uppercase mb-1">Apellidos</label>
                        <input type="text" id="regSurname" required class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-magenta uppercase mb-1">Teléfono</label>
                        <input type="tel" required class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-magenta uppercase mb-1">Email</label>
                        <input type="email" id="regEmail" required class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                    </div>
                </div>
                <div class="flex flex-col mb-4">
                    <label class="text-[10px] font-bold text-magenta uppercase mb-1">Contraseña</label>
                    <input type="password" required class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                </div>
                <button type="submit" class="btn-fill">Registrarse y Activar</button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">¿Ya tienes cuenta? <span onclick="toggleAuth()" class="text-magenta font-bold cursor-pointer underline">Inicia Sesión</span></p>
        </div>

        <div id="login-container" class="form-container" style="display:none;">
            <h2 class="text-2xl font-bold mb-6">Iniciar Sesión</h2>
            <form onsubmit="handleAuth(event, 'login')">
                <div class="flex flex-col mb-4">
                    <label class="text-[10px] font-bold text-magenta uppercase mb-1">Email</label>
                    <input type="email" id="logEmail" required class="w-full p-4 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                </div>
                <div class="flex flex-col mb-6">
                    <label class="text-[10px] font-bold text-magenta uppercase mb-1">Contraseña</label>
                    <input type="password" required class="w-full p-4 border border-gray-200 rounded-lg bg-gray-50 outline-none focus:border-magenta text-sm">
                </div>
                <button type="submit" class="btn-fill">Entrar a mi Agenda</button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">¿No tienes cuenta? <span onclick="toggleAuth()" class="text-magenta font-bold cursor-pointer underline">Regístrate aquí</span></p>
        </div>
    </div>
</div>

<div id="gallery-panel">
    <header class="flex flex-col sm:flex-row justify-between items-center border-b pb-6 mb-10 gap-4">
        <h1 class="text-2xl md:text-3xl font-light">Hola, <span id="userDisp" class="font-bold text-magenta"></span></h1>
        <button onclick="logout()" class="w-full sm:w-auto px-6 py-2 border border-gray-300 rounded-md text-xs font-bold uppercase hover:bg-gray-100 transition">Cerrar Sesión</button>
    </header>

    <div id="event-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
</div>

<script>
    const eventosData = [];

    function toggleAuth() {
        const reg = document.getElementById('register-container');
        const log = document.getElementById('login-container');
        const txt = document.getElementById('left-text');
        
        if(reg.style.display === 'none') {
            reg.style.display = 'block';
            log.style.display = 'none';
            txt.innerText = "Regístrate para activar tu agenda de eventos.";
        } else {
            reg.style.display = 'none';
            log.style.display = 'block';
            txt.innerText = "¡Qué bueno verte de nuevo! Accede a tu contenido.";
        }
    }

    function handleAuth(e, type) {
        e.preventDefault();
        let name;
        if(type === 'register') {
            name = document.getElementById('regName').value + " " + document.getElementById('regSurname').value;
        } else {
            name = document.getElementById('logEmail').value.split('@')[0];
        }
        sessionStorage.setItem("userSession", name);
        activateGallery(name);
    }

    function checkSession() {
        const user = sessionStorage.getItem("userSession");
        if(user) activateGallery(user);
    }

    function activateGallery(name) {
        document.getElementById('split-screen').style.display = 'none';
        document.getElementById('gallery-panel').style.display = 'block';
        document.getElementById('userDisp').innerText = name;

        const container = document.getElementById('event-container');
        container.innerHTML = ""; 

        if (eventosData.length === 0) {
            container.innerHTML = "<div class='no-events-msg'><h3>No tienes eventos en tu agenda todavía.</h3><p class='mt-2 text-sm'>Explora nuestra web para añadir nuevos planes.</p></div>";
        }
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }
</script>

</body>
</html>
